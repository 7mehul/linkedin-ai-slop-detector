<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="popup.css">
</head>
<body>

<header class="head">
  <div class="logo">🛡</div>
  <div>
    <h1>SLOPSHIELD</h1>
    <p class="tagline">Redacting LinkedIn slop since 2026.</p>
  </div>
  <label class="switch" title="Master toggle">
    <input type="checkbox" id="enabled">
    <span class="slider-ui"></span>
  </label>
</header>

<section class="counter">
  <span id="counter-line">🛡 0 posts redacted this session · 0 all time</span>
</section>

<section class="control">
  <div class="control-head"><label>MODE</label></div>
  <div class="segmented modes" id="mode">
    <button type="button" data-mode="chill">Chill</button>
    <button type="button" data-mode="default">Default</button>
    <button type="button" data-mode="robot">Everyone's a Robot</button>
  </div>
  <p class="threshold-note" id="threshold-note"></p>
</section>

<section class="control">
  <div class="control-head"><label>VERDICT TONE</label></div>
  <div class="segmented" id="tone">
    <button type="button" data-tone="mild">Mild</button>
    <button type="button" data-tone="medium">Medium</button>
    <button type="button" data-tone="unhinged">Unhinged</button>
  </div>
</section>

<footer class="about">
  <p>SlopShield detects the <em>LinkedIn-slop dialect</em>, not AI itself. It will
  absolutely flag sincere humans who write like robots. That's the bit.
  Nothing leaves your browser.</p>
  <a href="https://github.com/7mehul/linkedin-ai-slop-detector" target="_blank" rel="noreferrer">github</a>
</footer>

<script src="../content/scorer.js"></script>
<script src="popup.js"></script>
</body>
</html>
