<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>SlopShield popup stage (store screenshot)</title>
<style>
  /* Dev-only stage: centers the real popup on a backdrop for a 1280x800 shot. */
  body { margin: 0; height: 100vh; display: flex; align-items: center; justify-content: center;
         gap: 56px; background: #f4f2ee;
         font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
  .pitch { max-width: 360px; }
  .pitch h1 { font-size: 34px; font-weight: 900; letter-spacing: 4px; color: #101010; margin: 0 0 10px; }
  .pitch p { font-size: 16px; line-height: 1.5; color: #5a5346; margin: 0 0 8px; }
  .pitch .small { font-size: 12.5px; color: #8a857c; }
  .frame { width: 320px; border-radius: 12px; overflow: hidden;
           box-shadow: 0 18px 48px rgba(16, 16, 16, 0.28); }
  .frame iframe { display: block; width: 320px; height: 560px; border: 0; }
</style>
</head>
<body>
  <div class="pitch">
    <h1>🛡 SLOPSHIELD</h1>
    <p>Your feed, with the slop redacted. Pick a mode, pick a tone, watch the report fill up.</p>
    <p class="small">Runs entirely in your browser. No data leaves your machine.</p>
  </div>
  <div class="frame"><iframe src="../popup/popup.html?demo"></iframe></div>
</body>
</html>
